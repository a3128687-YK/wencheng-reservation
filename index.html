    function submitBooking() { if (!requireLineReady('message')) return; var data = collectForm(); var warning = validateFormData(data, true); if (warning) { showMessage(warning, true); return; } showMessage(T.loading, false); if (!hasBackend()) { showMessage(T.backendFail, true); return; } if (EDIT_ROW_NUMBER) { data.rowNumber = EDIT_ROW_NUMBER; apiCall('updateReservation', data, function (text) { showMessage(text || '?????', false); EDIT_ROW_NUMBER = null; byId('bookBtn').textContent = T.bookBtn; updateAvailableSlots(); loadSummary(); }, function (err) { showMessage(err, true); }); } else { apiCall('createReservation', data, function (text) { showMessage(text || T.bookBtn, false); updateAvailableSlots(); loadSummary(); }, function (err) { showMessage(String(err).indexOf('??') >= 0 ? T.conflict : err, true); updateAvailableSlots(); loadSummary(); }); } }

    function loadSummary() { var area = byId('summaryArea'); if (!area) return; area.innerHTML = '<div class="sectionNote">' + T.loading + '</div>'; if (!hasBackend() || !LINE_READY) { renderFallbackSummary(); return; } apiCall('getDay', { date: byId('summaryDateInput').value }, renderSummary, function (err) { area.innerHTML = '<div class="message err">' + escapeHtml(err) + '</div>'; }); }

    function renderSummary(data) { var area = byId('summaryArea'); if (!data || !data.rooms) { renderFallbackSummary(); return; } area.innerHTML = data.rooms.map(function (room) { var cells = room.slots.map(function (slot) { var isExperience = !slot.available && slot.booking && slot.booking.service === '\u9ad4\u9a57\u5ba2'; var klass = slot.available ? 'free' : (isExperience ? 'experience' : 'busy'); var label = slot.available ? T.free : (isExperience ? '\u9ad4\u9a57\u5ba2' : T.busy); var detail = slot.available ? '' : [slot.booking.technician, slot.booking.customer, slot.booking.service].filter(Boolean).join('<br>'); return '<div class="summaryCell ' + klass + '"><div class="summaryTime">' + escapeHtml(slot.start + '-' + slot.end) + '</div><div class="summaryDetail">' + label + (detail ? '<br>' + detail : '') + '</div></div>'; }).join(''); return '<div class="summaryRoom"><div class="roomName">' + escapeHtml(room.room) + '</div><div class="summaryGrid">' + cells + '</div></div>'; }).join(''); }
    function renderFallbackSummary() { renderSummary({ rooms: CONFIG.rooms.map(function (room) { var slots = []; for (var m = CONFIG.openHour * 60; m < CONFIG.closeHour * 60; m += 30) slots.push({ start: minToTime(m), end: minToTime(m + 30), available: true, booking: null }); return { room: room, slots: slots }; }) }); }
    function collectForm() { return Object.assign({ date: byId('dateInput').value, room: byId('roomSelect').value, start: byId('startSelect').value, end: byId('endSelect').value, technician: byId('technicianInput').value, customer: byId('customerInput').value.trim(), service: getCheckedServices() }, getLinePayload()); }
    function validateFormData(data, needsDetail) { if (!data.date || !data.room || !data.start || !data.end) return T.required; if (timeToMin(data.end) - timeToMin(data.start) < 60) return T.minWarn; if (needsDetail && (!data.technician || !data.service)) return T.required; return ''; }
    function resetBookingForm(showNotice) { EDIT_ROW_NUMBER = null; byId('bookBtn').textContent = T.bookBtn; byId('dateInput').value = ''; byId('roomSelect').value = ''; byId('technicianInput').value = ''; clearCheckedServices(); byId('customerInput').value = ''; AVAILABLE_SLOTS = []; fillStartOptions([]); renderSlotBoxes([], T.pickDateRoom); var box = byId('message'); box.textContent = ''; box.className = 'message'; if (showNotice && byId('userNameInput').value) showMessage(T.autoName, false); }
    function applyLineUserName() { setLineUserName(LINE_PROFILE.displayName || SERVER_USER_NAME || ''); }
    function setLineUserName(name) { byId('userNameInput').value = String(name || '').trim(); byId('userNameInput').readOnly = true; }
    function getLinePayload() { return { userId: LINE_PROFILE.userId, displayName: LINE_PROFILE.displayName, userName: LINE_PROFILE.displayName }; }
    function setToday(id) { var d = new Date(); byId(id).value = formatDateInput(d); }
    function dateOffsetString(days) { var d = new Date(); d.setDate(d.getDate() + days); return formatDateInput(d); }
    function dateOffsetDisplay(days) { return dateOffsetString(days).replace(/-/g, '/'); }
    function formatDateInput(d) { return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate()); }
    function buildFallbackSlots() { var slots = []; for (var m = CONFIG.openHour * 60; m <= CONFIG.closeHour * 60 - 60; m += 30) slots.push({ start: minToTime(m), end: minToTime(m + 60), ends: buildFallbackEnds(minToTime(m)) }); return slots; }
    function buildFallbackEnds(start) { var ends = []; for (var m = timeToMin(start) + 60; m <= CONFIG.closeHour * 60; m += 30) ends.push(minToTime(m)); return ends; }

    function renderServiceChecks() {
      var box = byId('serviceInput');
      if (!box) return;
      box.innerHTML = SERVICES.map(function (service, index) {
        var id = 'serviceCheck' + index;
        return '<label class="serviceCheck" for="' + id + '"><input id="' + id + '" type="checkbox" value="' + escapeHtml(service) + '"><span>' + escapeHtml(service) + '</span></label>';
      }).join('');
    }


    function setCheckedServices(serviceText) {
      var parts = String(serviceText || '').split('、');
      Array.prototype.forEach.call(byId('serviceInput').querySelectorAll('input'), function (item) {
        item.checked = parts.indexOf(item.value) !== -1;
      });
    }
    function getCheckedServices() {
      var checked = byId('serviceInput').querySelectorAll('input:checked');
      return Array.prototype.map.call(checked, function (item) { return item.value; }).join('、');
    }

    function clearCheckedServices() {
      Array.prototype.forEach.call(byId('serviceInput').querySelectorAll('input'), function (item) { item.checked = false; });
    }
    function fillSelect(id, list, keep, placeholder) { var select = byId(id); if (!select) return; var old = keep || select.value; select.innerHTML = ''; if (placeholder) select.appendChild(new Option(placeholder, '')); list.forEach(function (item) { select.appendChild(new Option(item, item)); }); if (old && list.indexOf(old) >= 0) select.value = old; else select.value = ''; }

    function apiCall(action, payload, onSuccess, onError) {
      if (!hasBackend()) { if (onError) onError('???? Apps Script API ??'); return; }
      payload = payload || {}; payload.idToken = LINE_ID_TOKEN || '';
      var callbackName = '__wcApi_' + Date.now() + '_' + Math.floor(Math.random() * 100000);
      var done = false; var script = document.createElement('script');
      var timer = setTimeout(function () { if (done) return; done = true; cleanup(); if (onError) onError('????????????'); }, 15000);
      window[callbackName] = function (res) { if (done) return; done = true; clearTimeout(timer); cleanup(); if (res && res.ok) { if (onSuccess) onSuccess(res.data); } else { if (onError) onError(res && res.error ? res.error : '??????'); } };
      function cleanup() { try { delete window[callbackName]; } catch (err) { window[callbackName] = null; } if (script && script.parentNode) script.parentNode.removeChild(script); }
      var params = 'api=' + encodeURIComponent(action) + '&callback=' + encodeURIComponent(callbackName) + '&payload=' + encodeURIComponent(JSON.stringify(payload));
      script.onerror = function () { if (done) return; done = true; clearTimeout(timer); cleanup(); if (onError) onError('????? Apps Script API'); };
      script.src = API_URL + (API_URL.indexOf('?') >= 0 ? '&' : '?') + params;
      document.body.appendChild(script);
    }

    function showMessage(text, isError) { showPanelMessage('message', text, isError); }
    function showPanelMessage(id, text, isError) { var box = byId(id); box.textContent = text || ''; box.className = 'message ' + (isError ? 'err' : 'ok'); }
    function clearBox(id) { var box = byId(id); if (!box) return; box.textContent = ''; box.className = 'message'; }
    function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }
    function hasBackend() { return API_URL && API_URL.indexOf('script.google.com/macros/s/') !== -1; }
    function byId(id) { return document.getElementById(id); }
    function pad2(n) { return String(n).padStart(2, '0'); }
    function minToTime(m) { return pad2(Math.floor(m / 60)) + ':' + pad2(m % 60); }
    function timeToMin(t) { var p = String(t || '0:0').split(':'); return Number(p[0]) * 60 + Number(p[1]); }
    function escapeHtml(s) { return String(s == null ? '' : s).replace(/[&<>\"]/g, function (c) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' })[c]; }); }
    function getErrorText(err) { return err && err.message ? err.message : String(err || '\u767c\u751f\u932f\u8aa4'); }
  </script>
</body>
</html>
