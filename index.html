    function getUrlPageParam() {
          var href = String(window.location.href || "");
          var search = String(window.location.search || "");
          var hash = String(window.location.hash || "");
          var page = readPageFromQueryText(search) || readPageFromQueryText(hash.replace(/^#/, "?"));
          if (page) return page;
    
          // LINE LIFF 常會把原本網址後面的 ?page=xxx 包進 liff.state。
          var state = readParamFromQueryText(search, "liff.state") || readParamFromQueryText(hash.replace(/^#/, "?"), "liff.state");
          if (state) {
            try { state = decodeURIComponent(state); } catch (error) {}
            page = readPageFromQueryText(state.indexOf("?") === 0 ? state : "?" + state);
            if (page) return page;
            page = readPageFromRawText(state);
            if (page) return page;
          }
    
          // 保底：直接從完整網址字串抓 page=xxx，避免 LINE 轉址格式變化。
          page = readPageFromRawText(href);
          if (page) return page;
    
          return "";
        }
    
        function readPageFromQueryText(text) {
          return readParamFromQueryText(text, "page");
        }
    
        function readParamFromQueryText(text, key) {
          text = String(text || "");
          if (!text) return "";
          if (text.charAt(0) !== "?") text = "?" + text.replace(/^#/, "");
          try { return new URLSearchParams(text).get(key) || ""; } catch (error) { return ""; }
        }
    
        function readPageFromRawText(text) {
          text = String(text || "");
          var match = text.match(/[?&#]page=([^&#]+)/);
          if (!match) return "";
          try { return decodeURIComponent(match[1]); } catch (error) { return match[1]; }
        }

    function filterFutureBookings(bookings, selectedDate) {
      var now = new Date();
      return (bookings || []).filter(function (b) {
        var rawDate = String(b.date || selectedDate || '').replace(/\//g, '-');
        var rawEnd = String(b.end || b.start || '00:00');
        var d = rawDate.split('-');
        var t = rawEnd.split(':');
        if (d.length < 3 || t.length < 2) return true;
        var endTime = new Date(Number(d[0]), Number(d[1]) - 1, Number(d[2]), Number(t[0]), Number(t[1]));
        return endTime.getTime() >= now.getTime();
      });
    }

      booking = booking || {};
      return [
        '\u9810\u7d04\u4eba\uff1a' + (booking.userName || '\u672a\u6307\u5b9a'),
        '\u6280\u5e2b\uff1a' + (booking.technician || '\u672a\u6307\u5b9a'),
        '\u9867\u5ba2\uff1a' + (booking.customer || '\u672a\u6307\u5b9a'),
        '\u9805\u76ee\uff1a' + (booking.service || '\u672a\u6307\u5b9a')
      ].map(escapeHtml).join('<br>');
    }

    function formatSlotRange(start, end) {
      return String(start || '') + '~' + String(end || '');
    }

    function formatSlotRangeHtml(start, end) {
      return escapeHtml(String(start || '')) + '<br>~' + escapeHtml(String(end || ''));
    }

    function formatReportTimeLabel(start) {
      return String(start || '');
    }

    function shortReportTime(timeText) {
      var text = String(timeText || '');
      if (!text) return '';
      return text + '~' + minToTime(timeToMin(text) + 30);
    }

    function formatReportSlotDetail(booking) {
      booking = booking || {};
      var service = String(booking.service || '');
      if (service === '\u9ad4\u9a57\u5ba2') return '\u9ad4';
      var technician = String(booking.technician || '\u9810');
      return escapeHtml(technician.slice(0, 2));
    }

    function getRoomTitleHtml(roomName) {
      var label = ROOM_EQUIPMENT_LABELS[normalizeRoomKey(roomName)];
      var name = escapeHtml(roomName || '');
      return label ? '<span class="roomMain">' + name + '</span><span class="roomEquip">（' + escapeHtml(label) + '）</span>' : '<span class="roomMain">' + name + '</span>';
    }

    function getRoomDisplayName(roomName) {
      var label = ROOM_EQUIPMENT_LABELS[normalizeRoomKey(roomName)];
      return label ? String(roomName || '') + '\uff08' + label + '\uff09' : String(roomName || '');
    }

    function getServicesForRoom(roomName) {
      var key = normalizeRoomKey(roomName);
      return ROOM_SERVICE_RULES[key] || SERVICES;
    }

    function normalizeRoomKey(roomName) {
      var text = String(roomName || '').replace(/\s+/g, '').replace(/^\u6587\u6210/, '').replace(/^\u6587\u6210\u6703\u9928/, '');
      var map = {
        '1\u6a13': '\u4e00\u6a13',
        '2\u6a13\u5de6': '\u4e8c\u6a13\u5de6',
        '2\u6a13\u53f3': '\u4e8c\u6a13\u53f3',
        '3\u6a13\u524d': '\u4e09\u6a13\u524d',
        '3\u6a13\u5f8c': '\u4e09\u6a13\u5f8c',
        '3\u6a13\u5de6': '\u4e09\u6a13\u5de6',
        '3\u6a13\u53f3': '\u4e09\u6a13\u53f3',
        '4\u6a13\u524d': '\u56db\u6a13\u524d',
        '4\u6a13\u5f8c\u5de6': '\u56db\u6a13\u5de6\u5f8c',
        '4\u6a13\u5de6\u5f8c': '\u56db\u6a13\u5de6\u5f8c',
        '\u56db\u6a13\u5f8c\u5de6': '\u56db\u6a13\u5de6\u5f8c',
        '\u56db\u6a13\u5de6\u5f8c': '\u56db\u6a13\u5de6\u5f8c',
        '4\u6a13\u5f8c\u53f3': '\u56db\u6a13\u53f3\u5f8c',
        '4\u6a13\u53f3\u5f8c': '\u56db\u6a13\u53f3\u5f8c',
        '\u56db\u6a13\u5f8c\u53f3': '\u56db\u6a13\u53f3\u5f8c',
        '\u56db\u6a13\u53f3\u5f8c': '\u56db\u6a13\u53f3\u5f8c',
        '5\u6a13': '\u4e94\u6a13',
        '5F': '\u4e94\u6a13',
        '\u4e94\u6a13': '\u4e94\u6a13',
        '\u9e7d\u76e4\u6d74': '\u5ca9\u76e4\u6d74'
      };
      return map[text] || text;
    }

    function enforceExclusiveCustomerFlags(changedItem) { return; }

    function getCheckedServiceTarget() {
          var checked = byId('serviceTargetInput') ? byId('serviceTargetInput').querySelector('input:checked') : null;
          return checked ? checked.value : '';
        }
    
        function clearCheckedServiceTarget() {
          if (!byId('serviceTargetInput')) return;
          Array.prototype.forEach.call(byId('serviceTargetInput').querySelectorAll('input'), function (item) { item.checked = false; });
          syncMainCustomerField();
        }
    
        function isServiceMarkerSelected() {
          return !!getCheckedServiceTarget();
        }
    
        function isMainCustomerSelected() {
          return isServiceMarkerSelected();
        }
    
        function syncMainCustomerField() {
          var wrap = byId('mainCustomerWrap');
          if (!wrap) return;
          var active = isServiceMarkerSelected();
          wrap.classList.toggle('active', active);
          if (!active && byId('mainCustomerSelect')) byId('mainCustomerSelect').value = '';
        }
    
        function stripMainCustomerMark(name) {
          return String(name || '').trim().replace(/\s+(B|F)$/i, '').replace(/BF$/i, '').trim();
        }
    
        function getCustomerMarkerFromName(name) {
          var text = String(name || '').trim();
          if (/BF$/i.test(text)) return 'BF';
          var match = text.match(/\s+(B|F)$/i);
          return match ? match[1].toUpperCase() : '';
        }
    
        function buildCustomerNameForSubmit(service) {
          var name = stripMainCustomerMark(byId('customerInput').value);
          var parts = String(service || '').split('、');
          var needsMark = SERVICE_TARGETS.some(function (flag) { return parts.indexOf(flag) !== -1; });
          if (!needsMark) return name;
          var mark = byId('mainCustomerSelect') ? byId('mainCustomerSelect').value : '';
          if (!mark) return name;
          return mark === 'BF' ? name + 'BF' : name + ' ' + mark;
        }

    function setCheckedServices(serviceText) {
          var parts = String(serviceText || '').split('、').filter(Boolean);
          var target = parts.filter(function (item) { return SERVICE_TARGETS.indexOf(item) !== -1; })[0] || '';
          if (byId('serviceTargetInput')) {
            Array.prototype.forEach.call(byId('serviceTargetInput').querySelectorAll('input'), function (item) { item.checked = item.value === target; });
          }
          Array.prototype.forEach.call(byId('serviceInput').querySelectorAll('input'), function (item) {
            item.checked = parts.indexOf(item.value) !== -1;
          });
          syncMainCustomerField();
        }
    
        function getCheckedServiceItems() {
          var checked = byId('serviceInput').querySelectorAll('input:checked');
          return Array.prototype.map.call(checked, function (item) { return item.value; }).join('、');
        }
    
        function getCheckedServices() {
          var parts = [];
          var target = getCheckedServiceTarget();
          var items = getCheckedServiceItems();
          if (target) parts.push(target);
          if (items) parts = parts.concat(items.split('、'));
          return parts.join('、');
        }
    
        function clearCheckedServices() {
          Array.prototype.forEach.call(byId('serviceInput').querySelectorAll('input'), function (item) { item.checked = false; });
          syncMainCustomerField();
        }
    function fillSelect(id, list, keep, placeholder) { var select = byId(id); if (!select) return; var old = keep || select.value; select.innerHTML = ''; if (placeholder) select.appendChild(new Option(placeholder, '')); list.forEach(function (item) { select.appendChild(new Option(item, item)); }); if (old && list.indexOf(old) >= 0) select.value = old; else select.value = ''; }
    function fillRoomSelect(id, list, keep, placeholder) { var select = byId(id); if (!select) return; var old = keep || select.value; select.innerHTML = ''; if (placeholder) select.appendChild(new Option(placeholder, '')); list.forEach(function (item) { select.appendChild(new Option(getRoomOptionLabel(item), item)); }); if (old && list.indexOf(old) >= 0) select.value = old; else select.value = ''; }
    function getRoomOptionLabel(roomName) { var label = ROOM_EQUIPMENT_LABELS[normalizeRoomKey(roomName)]; return label ? String(roomName || '') + '\uff08' + label + '\uff09' : String(roomName || ''); }

    function apiCall(action, payload, onSuccess, onError) {
      if (!hasBackend()) { if (onError) onError('???? Apps Script API ??'); return; }
      payload = payload || {}; payload.idToken = LINE_ID_TOKEN || ''; payload.readOnlyMode = !canManageBookings();
      var callbackName = '__wcApi_' + Date.now() + '_' + Math.floor(Math.random() * 100000);
      var done = false; var script = document.createElement('script');
      var timer = setTimeout(function () { if (done) return; done = true; cleanup(); if (onError) onError('????????????'); }, 15000);
      window[callbackName] = function (res) { if (done) return; done = true; clearTimeout(timer); cleanup(); if (res && res.ok) { if (onSuccess) onSuccess(res.data); } else { if (onError) onError(res && res.error ? res.error : '??????'); } };
      function cleanup() { try { delete window[callbackName]; } catch (err) { window[callbackName] = null; } if (script && script.parentNode) script.parentNode.removeChild(script); }
      var params = 'api=' + encodeURIComponent(action) + '&callback=' + encodeURIComponent(callbackName) + '&payload=' + encodeURIComponent(JSON.stringify(payload));
      script.onerror = function () { if (done) return; done = true; clearTimeout(timer); cleanup(); if (onError) onError('????? Apps Script API'); };
      script.src = API_URL + (API_URL.indexOf('?') >= 0 ? '&' : '?') + params;
      document.body.appendChild(script);
    }

    function showToast(text, isError) {
      var old = document.getElementById('toastMessage');
      if (old) old.remove();
      var box = document.createElement('div');
      box.id = 'toastMessage';
      box.className = 'toastMessage ' + (isError ? 'err' : 'ok');
      box.textContent = String(text || '');
      document.body.appendChild(box);
      setTimeout(function () { if (box && box.parentNode) box.parentNode.removeChild(box); }, isError ? 4200 : 3000);
    }
    function getActiveMessageId() {
      if (byId('queryPanel') && byId('queryPanel').classList.contains('active')) return 'queryMessage';
      if (byId('cancelPanel') && byId('cancelPanel').classList.contains('active')) return 'cancelMessage';
      return 'message';
    }
    function refreshVisibleLists() {
      if (byId('queryPanel') && byId('queryPanel').classList.contains('active')) {
        if (byId('queryDateInput').value && byId('queryTechSelect').value) updateQueryNameOptions(true);
        return;
      }
      if (byId('cancelPanel') && byId('cancelPanel').classList.contains('active')) loadCancelBookings();
    }
    function scrollToMessage(id) {
      var box = byId(id);
      if (box) box.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
    function showMessage(text, isError) { showPanelMessage('message', text, isError); }
    function showPanelMessage(id, text, isError) { var box = byId(id); if (!box) { showToast(text, isError); return; } box.textContent = text || ''; box.className = 'message ' + (isError ? 'err' : 'ok'); }
    function clearBox(id) { var box = byId(id); if (!box) return; box.textContent = ''; box.className = 'message'; }
    function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }
    function hasBackend() { return API_URL && API_URL.indexOf('script.google.com/macros/s/') !== -1; }
    function byId(id) { return document.getElementById(id); }
    function pad2(n) { return String(n).padStart(2, '0'); }
    function minToTime(m) { return pad2(Math.floor(m / 60)) + ':' + pad2(m % 60); }
    function timeToMin(t) { var p = String(t || '0:0').split(':'); return Number(p[0]) * 60 + Number(p[1]); }
    function escapeHtml(s) { return String(s == null ? '' : s).replace(/[&<>\"]/g, function (c) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' })[c]; }); }
    function getErrorText(err) { return err && err.message ? err.message : String(err || '\u767c\u751f\u932f\u8aa4'); }
  </script>
</body>
</html>
